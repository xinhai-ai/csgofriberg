name: csgofriberg

x-app-environment: &app-environment
  NODE_ENV: production
  NODE_OPTIONS: --max-old-space-size=192
  PORT: 3000
  TRUST_PROXY: ${TRUST_PROXY:-true}
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
  GUEST_ID_SALT: ${GUEST_ID_SALT:?set GUEST_ID_SALT in .env}
  DB_CLIENT: pg
  DB_URL: postgres://${POSTGRES_USER:-csgofriberg}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-csgofriberg}
  DB_POOL_MIN: ${DB_POOL_MIN:-0}
  DB_POOL_MAX: ${DB_POOL_MAX:-5}
  REDIS_URL: redis://redis:6379
  REDIS_PREFIX: ${REDIS_PREFIX:-csgofriberg:}
  REDIS_REQUIRED: "true"
  REDIS_COMMAND_TIMEOUT_MS: ${REDIS_COMMAND_TIMEOUT_MS:-1500}
  PASSWORD_WORKERS: ${PASSWORD_WORKERS:-2}
  PASSWORD_QUEUE_LIMIT: ${PASSWORD_QUEUE_LIMIT:-64}
  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-8}
  CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS in .env}
  POW_DIFFICULTY: ${POW_DIFFICULTY:-17}
  POW_CHALLENGE_TTL_SECONDS: ${POW_CHALLENGE_TTL_SECONDS:-120}
  POW_TOKEN_TTL_SECONDS: ${POW_TOKEN_TTL_SECONDS:-600}
  SHOW_LEADERBOARD: ${SHOW_LEADERBOARD:-true}

services:
  migrate:
    image: ${IMAGE:-ghcr.io/xinhai-ai/csgofriberg:latest}
    restart: "no"
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment: *app-environment
    command: ["server/dist/db/migrate.js"]
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    mem_limit: 192m
    security_opt:
      - no-new-privileges:true

  app:
    image: ${IMAGE:-ghcr.io/xinhai-ai/csgofriberg:latest}
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment: *app-environment
    ports:
      - 127.0.0.1:${APP_PORT:-3000}:3000
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - /nodejs/bin/node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-csgofriberg}
      POSTGRES_USER: ${POSTGRES_USER:-csgofriberg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=256MB
      - -c
      - work_mem=1MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=30
    volumes:
      - type: bind
        source: ${PGDATA_PATH:-./data/pgdata}
        target: /var/lib/postgresql/data
    mem_limit: 384m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 80mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis-data:/data
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
